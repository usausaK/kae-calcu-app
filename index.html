<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>佳英ちゃんべんきょうアプリ</title>
  <!-- React, ReactDOM, Babel をCDNから読み込み -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #667eea;">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ═══════════════════════════════════════════
    //  共通
    // ═══════════════════════════════════════════
    const FONT = "'Zen Maru Gothic','Hiragino Marugo ProN',sans-serif";
    const STORAGE_TIME = "kae_try_count";
    const STORAGE_FRAC = "kae_fraction_try_count";

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    function approxEq(a, b) { return Math.abs(a - b) < 1e-9; }

    const safeStorage = {
      get: async (key) => {
        const val = localStorage.getItem(key);
        return val ? { value: val } : null;
      },
      set: async (key, val) => {
        localStorage.setItem(key, val);
      }
    };

    // ═══════════════════════════════════════════
    //  名前確認画面（共通）
    // ═══════════════════════════════════════════
    function IdentityScreen({ onAnswer, bg }) {
      return (
        <div style={{ minHeight:"100vh", background:bg,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontFamily:FONT, padding:"20px" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
            * { box-sizing:border-box; }
            .id-card { background:rgba(255,255,255,0.96); border-radius:28px; padding:44px 28px;
              width:100%; max-width:360px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
            .id-emoji { font-size:3.5rem; margin-bottom:16px; display:block;
              animation:bob 1.2s ease-in-out infinite alternate; }
            @keyframes bob { from{transform:translateY(0)} to{transform:translateY(-10px)} }
            .id-title { font-size:1.6rem; font-weight:900; color:#5a3e8f; margin-bottom:8px; }
            .id-sub   { font-size:0.88rem; color:#999; margin-bottom:28px; }
            .id-btns  { display:flex; gap:12px; }
            .id-btn   { flex:1; padding:16px; border:none; border-radius:16px; font-size:1.1rem;
                        font-weight:900; cursor:pointer; font-family:inherit; transition:all 0.15s; }
            .id-yes   { background:linear-gradient(135deg,#f093fb,#f5576c); color:white;
                        box-shadow:0 6px 20px rgba(240,83,245,.35); }
            .id-yes:hover { transform:translateY(-2px); }
            .id-no    { background:#f3f4f6; color:#888; }
            .id-no:hover { background:#e5e7eb; }
          `}</style>
          <div className="id-card">
            <span className="id-emoji">🌸</span>
            <div className="id-title">あなたは佳英ちゃん？</div>
            <div className="id-sub">べんきょうをはじめる前に教えてね！</div>
            <div className="id-btns">
              <button className="id-btn id-yes" onClick={() => onAnswer(true)}>はい！</button>
              <button className="id-btn id-no"  onClick={() => onAnswer(false)}>ちがう（ゲスト）</button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  時間・速さクイズ データ
    // ═══════════════════════════════════════════
    const TIME_QUESTIONS = [
      { cat:"秒 → 分", q:"20秒は何分？",  answer:1/3,  choices:[1/6,1/4,1/3,1/2],  fracMap:{"0.1667":"1/6","0.25":"1/4","0.3333":"1/3","0.5":"1/2"}, displayAnswer:"1/3分（約0.33分）", explanation:"秒 → 分 は ÷60\n20 ÷ 60 = 1/3（約0.33）" },
      { cat:"秒 → 分", q:"15秒は何分？",  answer:0.25, choices:[0.1,0.2,0.25,0.5], fracMap:{"0.25":"1/4","0.5":"1/2"}, displayAnswer:"0.25分（= 1/4分）", explanation:"秒 → 分 は ÷60\n15 ÷ 60 = 0.25（= 1/4）" },
      { cat:"秒 → 分", q:"30秒は何分？",  answer:0.5,  choices:[0.2,0.25,0.5,0.75],fracMap:{"0.25":"1/4","0.5":"1/2","0.75":"3/4"}, displayAnswer:"0.5分（= 1/2分）", explanation:"秒 → 分 は ÷60\n30 ÷ 60 = 0.5（= 1/2）" },
      { cat:"秒 → 分", q:"45秒は何分？",  answer:0.75, choices:[0.25,0.5,0.75,1.5], fracMap:{"0.25":"1/4","0.5":"1/2","0.75":"3/4"}, displayAnswer:"0.75分（= 3/4分）", explanation:"秒 → 分 は ÷60\n45 ÷ 60 = 0.75（= 3/4）" },
      { cat:"秒 → 分", q:"40秒は何分？",  answer:2/3,  choices:[1/3,0.5,2/3,0.75], fracMap:{"0.3333":"1/3","0.6667":"2/3","0.5":"1/2","0.75":"3/4"}, displayAnswer:"2/3分（約0.67分）", explanation:"秒 → 分 は ÷60\n40 ÷ 60 = 2/3（約0.67）" },
      { cat:"秒 → 分", q:"12秒は何分？",  answer:0.2,  choices:[0.1,0.2,0.25,0.5], fracMap:{"0.2":"1/5","0.25":"1/4"}, displayAnswer:"0.2分（= 1/5分）", explanation:"秒 → 分 は ÷60\n12 ÷ 60 = 0.2（= 1/5）" },
      { cat:"秒 → 分", q:"90秒は何分？",  answer:1.5,  choices:[0.9,1.25,1.5,2],   fracMap:{"1.5":"3/2"}, displayAnswer:"1.5分（= 3/2分）", explanation:"秒 → 分 は ÷60\n90 ÷ 60 = 1.5（= 3/2）" },
      { cat:"分 → 秒", q:"1/2分は何秒？", answer:30,   choices:[15,20,30,45], fracMap:{}, displayAnswer:"30秒", explanation:"分 → 秒 は ×60\n1/2 × 60 = 30" },
      { cat:"分 → 秒", q:"1/4分は何秒？", answer:15,   choices:[10,12,15,20], fracMap:{}, displayAnswer:"15秒", explanation:"分 → 秒 は ×60\n1/4 × 60 = 15" },
      { cat:"分 → 秒", q:"1/3分は何秒？", answer:20,   choices:[15,20,30,40], fracMap:{}, displayAnswer:"20秒", explanation:"分 → 秒 は ×60\n1/3 × 60 = 20" },
      { cat:"分 → 秒", q:"3/4分は何秒？", answer:45,   choices:[30,40,45,50], fracMap:{}, displayAnswer:"45秒", explanation:"分 → 秒 は ×60\n3/4 × 60 = 45" },
      { cat:"分 → 時間", q:"15分は何時間？", answer:0.25, choices:[0.1,0.2,0.25,0.5], fracMap:{"0.25":"1/4","0.5":"1/2"}, displayAnswer:"0.25時間（= 1/4）", explanation:"分 → 時間 は ÷60\n15 ÷ 60 = 0.25（= 1/4）" },
      { cat:"分 → 時間", q:"20分は何時間？", answer:1/3,  choices:[0.25,1/3,0.5,2/3], fracMap:{"0.25":"1/4","0.3333":"1/3","0.5":"1/2","0.6667":"2/3"}, displayAnswer:"1/3時間（約0.33）", explanation:"分 → 時間 は ÷60\n20 ÷ 60 = 1/3（約0.33）" },
      { cat:"分 → 時間", q:"30分は何時間？", answer:0.5,  choices:[0.25,1/3,0.5,0.75],fracMap:{"0.25":"1/4","0.3333":"1/3","0.5":"1/2","0.75":"3/4"}, displayAnswer:"0.5時間（= 1/2）", explanation:"分 → 時間 は ÷60\n30 ÷ 60 = 0.5（= 1/2）" },
      { cat:"分 → 時間", q:"45分は何時間？", answer:0.75, choices:[0.5,2/3,0.75,1],    fracMap:{"0.5":"1/2","0.6667":"2/3","0.75":"3/4"}, displayAnswer:"0.75時間（= 3/4）", explanation:"分 → 時間 は ÷60\n45 ÷ 60 = 0.75（= 3/4）" },
      { cat:"時間 → 分", q:"1/2時間は何分？", answer:30,  choices:[20,25,30,45], fracMap:{}, displayAnswer:"30分", explanation:"時間 → 分 は ×60\n1/2 × 60 = 30" },
      { cat:"時間 → 分", q:"1/4時間は何分？", answer:15,  choices:[10,12,15,20], fracMap:{}, displayAnswer:"15分", explanation:"時間 → 分 は ×60\n1/4 × 60 = 15" },
      { cat:"時間 → 分", q:"1/3時間は何分？", answer:20,  choices:[15,20,25,30], fracMap:{}, displayAnswer:"20分", explanation:"時間 → 分 は ×60\n1/3 × 60 = 20" },
      { cat:"分速 → 秒速", q:"分速 30m は秒速何m？", answer:0.5,  choices:[0.25,0.5,0.75,1],  fracMap:{"0.25":"1/4","0.5":"1/2","0.75":"3/4"}, displayAnswer:"秒速 0.5m（= 1/2）", explanation:"分速 → 秒速 は ÷60\n30 ÷ 60 = 0.5（= 1/2）" },
      { cat:"分速 → 秒速", q:"分速 45m は秒速何m？", answer:0.75, choices:[0.5,0.75,1,1.5],   fracMap:{"0.5":"1/2","0.75":"3/4"}, displayAnswer:"秒速 0.75m（= 3/4）", explanation:"分速 → 秒速 は ÷60\n45 ÷ 60 = 0.75（= 3/4）" },
      { cat:"秒速 → 分速", q:"秒速 1/4m は分速何m？", answer:15, choices:[10,12,15,20], fracMap:{}, displayAnswer:"分速 15m", explanation:"秒速 → 分速 は ×60\n1/4 × 60 = 15" },
      { cat:"秒速 → 分速", q:"秒速 1/3m は分速何m？", answer:20, choices:[15,20,25,30], fracMap:{}, displayAnswer:"分速 20m", explanation:"秒速 → 分速 は ×60\n1/3 × 60 = 20" },
      { cat:"分速 → 時速", q:"分速 500m は時速何km？", answer:30, choices:[5,30,50,300], fracMap:{}, displayAnswer:"時速 30km", explanation:"分速(m) → 時速(km) は ×60÷1000\n500 × 60 ÷ 1000 = 30" },
      { cat:"分速 → 時速", q:"分速 100m は時速何km？", answer:6,  choices:[1,6,10,60],  fracMap:{}, displayAnswer:"時速 6km",  explanation:"分速(m) → 時速(km) は ×60÷1000\n100 × 60 ÷ 1000 = 6" },
      { cat:"時速 → 分速", q:"時速 6km は分速何m？",   answer:100, choices:[10,60,100,600], fracMap:{}, displayAnswer:"分速 100m", explanation:"時速(km) → 分速(m) は ×1000÷60\n6 × 1000 ÷ 60 = 100" },
      { cat:"時速 → 分速", q:"時速 9km は分速何m？",   answer:150, choices:[15,90,150,900], fracMap:{}, displayAnswer:"分速 150m", explanation:"時速(km) → 分速(m) は ×1000÷60\n9 × 1000 ÷ 60 = 150" },
    ];

    const CAT_COLORS = {
      "秒 → 分":    {bg:"#dbeafe",color:"#1d4ed8"}, "分 → 秒":    {bg:"#fef9c3",color:"#92400e"},
      "分 → 時間":  {bg:"#dcfce7",color:"#15803d"}, "時間 → 分":  {bg:"#fce7f3",color:"#9d174d"},
      "分速 → 秒速":{bg:"#ede9fe",color:"#5b21b6"}, "秒速 → 分速":{bg:"#ffedd5",color:"#c2410c"},
      "分速 → 時速":{bg:"#cffafe",color:"#0e7490"}, "時速 → 分速":{bg:"#f0fdf4",color:"#166534"},
    };

    function formatVal(val, fracMap) {
      const key = val.toFixed(4);
      if (fracMap && fracMap[key]) {
        const dec = parseFloat(val.toFixed(2));
        return `${dec}\n（${fracMap[key]}）`;
      }
      return String(parseFloat(val.toFixed(4)));
    }

    function TimeQuiz({ identity, tryCount }) {
      const [questions, setQuestions] = useState(() => shuffle(TIME_QUESTIONS).slice(0,10).map(q=>({...q,shuffledChoices:shuffle(q.choices)})));
      const [current,  setCurrent]  = useState(0);
      const [selected, setSelected] = useState(null);
      const [result,   setResult]   = useState(null);
      const [score,    setScore]    = useState(0);
      const [finished, setFinished] = useState(false);
      const [emoji,    setEmoji]    = useState("");

      const q = questions[current], total = questions.length;
      const pct = Math.round((score/total)*100);
      const EQ_C = ["🎉","✨","🌟","🎊","👏","🥳"], EQ_W = ["😅","💪","🤔","😄"];

      const handleSelect = (val) => {
        if (result) return;
        setSelected(val);
        const ok = approxEq(val, q.answer);
        setResult(ok?"correct":"wrong");
        if (ok) { setScore(s=>s+1); setEmoji(EQ_C[Math.floor(Math.random()*EQ_C.length)]); }
        else    { setEmoji(EQ_W[Math.floor(Math.random()*EQ_W.length)]); }
      };
      const handleNext = () => {
        if (current+1>=total) { setFinished(true); return; }
        setCurrent(c=>c+1); setSelected(null); setResult(null);
      };
      const handleRestart = () => {
        setQuestions(shuffle(TIME_QUESTIONS).slice(0,10).map(q=>({...q,shuffledChoices:shuffle(q.choices)})));
        setCurrent(0); setSelected(null); setResult(null); setScore(0); setFinished(false);
      };

      const choiceStyle = (val) => {
        const isAns = approxEq(val, q.answer), isSel = selected!==null && approxEq(val,selected);
        const base = { width:"100%", padding:"10px 6px", border:"2.5px solid", borderRadius:"14px",
          fontSize:"1rem", fontWeight:800, cursor:result?"default":"pointer",
          transition:"all .15s", background:"white", fontFamily:FONT, lineHeight:1.4,
          whiteSpace:"pre-wrap", minHeight:"60px", display:"flex", alignItems:"center", justifyContent:"center" };
        if (!result)  return {...base, borderColor:"#c9b6f0", color:"#3a2660"};
        if (isAns)    return {...base, borderColor:"#22c55e", background:"#e6ffed", color:"#15803d"};
        if (isSel)    return {...base, borderColor:"#f97316", background:"#fff3e0", color:"#c2410c"};
        return {...base, borderColor:"#e5e7eb", color:"#ccc"};
      };

      if (finished) return (
        <div style={{textAlign:"center", padding:"10px 0"}}>
          <div style={{width:100,height:100,borderRadius:"50%",background:"linear-gradient(135deg,#764ba2,#f093fb)",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            margin:"0 auto 16px",boxShadow:"0 8px 28px rgba(118,75,162,.4)"}}>
            <div style={{fontSize:"1.8rem",fontWeight:900,color:"white",lineHeight:1}}>{score}</div>
            <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,.85)",fontWeight:700}}>/ {total} 問</div>
          </div>
          <div style={{fontSize:"1.3rem",fontWeight:900,color:"#3a2660",marginBottom:5}}>
            {pct===100?"🏆 満点！すごい！":pct>=80?"🌟 よくできました！":pct>=60?"😄 がんばったね！":"💪 もう一回！"}
          </div>
          <div style={{fontSize:".88rem",color:"#777",marginBottom:20}}>
            {pct===100?"全問正解！変換マスターだ！":`${total}問中 ${score}問 正解（${pct}%）`}
          </div>
          <button onClick={handleRestart} style={{width:"100%",padding:13,border:"none",borderRadius:16,
            fontSize:"1rem",fontWeight:900,cursor:"pointer",fontFamily:FONT,
            background:"linear-gradient(135deg,#764ba2,#667eea)",color:"white"}}>もう一回やる 🔄</button>
        </div>
      );

      const c = CAT_COLORS[q.cat] || {bg:"#f3f4f6",color:"#374151"};
      return (
        <div>
          <div style={{textAlign:"right",fontSize:"0.8rem",color:"#aaa",fontWeight:700}}>{current+1} / {total}</div>
          <div style={{height:8,background:"#e8dfff",borderRadius:999,overflow:"hidden",margin:"4px 0 14px"}}>
            <div style={{height:"100%",width:`${((current+1)/total)*100}%`,
              background:"linear-gradient(90deg,#764ba2,#f093fb)",borderRadius:999,transition:"width .4s"}} />
          </div>
          <div style={{background:"linear-gradient(135deg,#f3e8ff,#e0e8ff)",borderRadius:18,
            padding:"18px 16px",textAlign:"center",fontSize:"1.1rem",fontWeight:700,color:"#3a2660",
            marginBottom:14,minHeight:80,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:"100%"}}>
              <div style={{display:"inline-block",fontSize:"0.68rem",fontWeight:900,
                padding:"3px 10px",borderRadius:999,marginBottom:9,
                background:c.bg,color:c.color,letterSpacing:"0.05em"}}>{q.cat}</div>
              <div>{q.q}</div>
            </div>
          </div>
          {result && (
            <div style={{textAlign:"center",fontSize:"0.95rem",fontWeight:900,padding:"11px 12px",
              borderRadius:12,marginBottom:10,
              background:result==="correct"?"#e6ffed":"#fff3e0",
              color:result==="correct"?"#15803d":"#c2410c",
              border:`2px solid ${result==="correct"?"#86efac":"#fdba74"}`}}>
              {emoji} {result==="correct"?`正解！答えは ${q.displayAnswer} だよ！`:`おしい！正解は ${q.displayAnswer} だよ`}
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>
            {q.shuffledChoices.map((val,i) => (
              <button key={i} style={choiceStyle(val)} onClick={()=>handleSelect(val)} disabled={!!result}>
                {formatVal(val,q.fracMap)}{result && approxEq(val,q.answer)?" ✓":""}
              </button>
            ))}
          </div>
          {result && (
            <div style={{background:"#faf5ff",border:"2px solid #d8b4fe",borderRadius:14,
              padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:"0.7rem",fontWeight:900,color:"#7c3aed",letterSpacing:".08em",marginBottom:7}}>💡 解き方</div>
              <div style={{fontSize:"0.95rem",fontWeight:700,color:"#3a2660",lineHeight:1.9,whiteSpace:"pre-wrap"}}>
                {q.explanation.split("\n").map((line,i,arr) => {
                  if (i===arr.length-1) {
                    const parts = line.split(/(=\s*[\d./（）と\s]+(?:（[^）]+）)?)/);
                    return <div key={i}>{parts.map((p,j)=>/^=/.test(p)?<span key={j} style={{color:"#15803d",fontWeight:900}}>{p}</span>:p)}</div>;
                  }
                  return <div key={i}>{line.split(/(÷\d+|×\d+)/g).map((p,j)=>/^[÷×]\d+$/.test(p)?<span key={j} style={{display:"inline-block",background:"#ede9fe",color:"#6d28d9",borderRadius:6,padding:"1px 6px",fontSize:"0.88rem",fontWeight:900,margin:"0 2px"}}>{p}</span>:p)}</div>;
                })}
              </div>
            </div>
          )}
          {result && (
            <button onClick={handleNext} style={{width:"100%",padding:13,border:"none",borderRadius:16,
              fontSize:"1rem",fontWeight:900,cursor:"pointer",fontFamily:FONT,
              background:"linear-gradient(135deg,#f093fb,#f5576c)",color:"white"}}>
              {current+1>=total?"結果を見る 🎊":"つぎへ →"}
            </button>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  約分ロジック・表示
    // ═══════════════════════════════════════════
    function gcd(a,b) { return b===0?a:gcd(b,a%b); }
    function isReduced(a,b) { return gcd(a,b)===1; }
    function getTrueDivisors(a,b) {
      const g=gcd(a,b), divs=[];
      for (let i=2;i<=g;i++) if(g%i===0) divs.push(i);
      return divs;
    }
    function getChoiceDivisors(a,b) {
      const correct=getTrueDivisors(a,b), chosen=new Set(correct), pool=[];
      for (let d=2;d<=13;d++) if(!chosen.has(d)&&!(a%d===0&&b%d===0)) pool.push(d);
      pool.sort(()=>Math.random()-.5);
      for (const d of pool) { if(chosen.size>=6) break; chosen.add(d); }
      return Array.from(chosen).sort((x,y)=>x-y);
    }

    const DECIMAL_QS = [
      {decimal:"0.5",ansNum:1,ansDen:2},{decimal:"0.25",ansNum:1,ansDen:4},
      {decimal:"0.75",ansNum:3,ansDen:4},{decimal:"1.5",ansNum:3,ansDen:2},
      {decimal:"0.2",ansNum:1,ansDen:5},{decimal:"0.4",ansNum:2,ansDen:5},
      {decimal:"0.6",ansNum:3,ansDen:5},{decimal:"0.8",ansNum:4,ansDen:5},
      {decimal:"1.25",ansNum:5,ansDen:4},{decimal:"1.75",ansNum:7,ansDen:4},
      {decimal:"0.125",ansNum:1,ansDen:8},{decimal:"2.5",ansNum:5,ansDen:2},
      {decimal:"0.1",ansNum:1,ansDen:10},{decimal:"1.2",ansNum:6,ansDen:5},
    ];

    function genReduceQ() {
      const good=[];
      for (let b=10;b<=100;b++) for (let a=4;a<b;a++) {
        const g=gcd(a,b);
        if(g>=3||getTrueDivisors(a,b).length>=2) good.push([a,b]);
      }
      const [a,b]=good[Math.floor(Math.random()*good.length)];
      return {type:"reduce",num:a,den:b,origNum:a,origDen:b,id:Date.now()+Math.random()};
    }
    function genDecimalQ() {
      const pool=[...DECIMAL_QS]; pool.sort(()=>Math.random()-.5);
      const q=pool[0], str=q.decimal;
      const dec=(str.split(".")[1]||"").length, denom=Math.pow(10,dec);
      const numer=Math.round(parseFloat(str)*denom);
      return {type:"decimal",decimal:q.decimal,num:numer,den:denom,origNum:numer,origDen:denom,
        ansNum:q.ansNum,ansDen:q.ansDen,id:Date.now()+Math.random()};
    }
    function genQ() { return Math.random()<0.3?genDecimalQ():genReduceQ(); }

    function Frac({num,den,size="lg",color="#3a2660",strike=false}) {
      const fs = size==="xl"?"2rem":size==="lg"?"1.6rem":"1.1rem";
      const st = strike?{textDecoration:"line-through",color:"#bbb",fontSize:"0.85em"}:{};
      return (
        <span style={{display:"inline-flex",flexDirection:"column",alignItems:"center",lineHeight:1.1,margin:"0 4px"}}>
          <span style={{fontSize:fs,fontWeight:900,color,...st}}>{num}</span>
          <span style={{width:"100%",height:"2.5px",background:strike?"#ccc":color,borderRadius:2,margin:"3px 0"}}/>
          <span style={{fontSize:fs,fontWeight:900,color,...st}}>{den}</span>
        </span>
      );
    }

    const FRAC_TOTAL = 10;
    function FracApp({ identity, tryCount }) {
      const [q,       setQ]       = useState(genQ);
      const [history, setHistory] = useState([]);
      const [done,    setDone]    = useState(false);
      const [qNum,    setQNum]    = useState(1);
      const [correct, setCorrect] = useState(0);
      const [finished,setFinished]= useState(false);
      const [shake,   setShake]   = useState(false);
      const [typed,   setTyped]   = useState("");
      const [typing,  setTyping]  = useState(true);

      useEffect(() => {
        const full = q.type==="decimal" ? `${q.decimal}  ＝` : `${q.origNum}  ÷  ${q.origDen}  ＝`;
        setTyped(""); setTyping(true);
        let i=0;
        const t = setInterval(()=>{ i++; setTyped(full.slice(0,i)); if(i>=full.length){clearInterval(t);setTyping(false);} },120);
        return ()=>clearInterval(t);
      }, [q.id]);

      const allChoices=getChoiceDivisors(q.num,q.den), trueDivs=getTrueDivisors(q.num,q.den), nowRed=isReduced(q.num,q.den);
      let stepsN=[q.origNum],stepsD=[q.origDen],cn=q.origNum,cd=q.origDen;
      for(const h of history){cn/=h.d;cd/=h.d;stepsN.push(cn);stepsD.push(cd);}

      const handleDiv = (d) => {
        if(done) return;
        if(q.num%d!==0||q.den%d!==0){setShake(true);setTimeout(()=>setShake(false),500);return;}
        const nn=q.num/d, nd=q.den/d;
        setHistory(h=>[...h,{d}]); setQ(p=>({...p,num:nn,den:nd}));
        if(isReduced(nn,nd)){setDone(true);setCorrect(c=>c+1);}
      };
      const next = () => {
        if(qNum>=FRAC_TOTAL){setFinished(true);return;}
        setQ(genQ()); setHistory([]); setDone(false); setQNum(n=>n+1);
      };
      const restart = () => {
        setQ(genQ()); setHistory([]); setDone(false); setQNum(1); setCorrect(0); setFinished(false);
      };

      const pct = Math.round((correct/FRAC_TOTAL)*100);

      if (finished) return (
        <div style={{textAlign:"center",padding:"10px 0"}}>
          <div style={{width:100,height:100,borderRadius:"50%",background:"linear-gradient(135deg,#f472b6,#c084fc)",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            margin:"0 auto 16px",boxShadow:"0 8px 28px rgba(196,72,250,.35)"}}>
            <div style={{fontSize:"1.8rem",fontWeight:900,color:"white",lineHeight:1}}>{correct}</div>
            <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,.85)",fontWeight:700}}>/ {FRAC_TOTAL} 問</div>
          </div>
          <div style={{fontSize:"1.3rem",fontWeight:900,color:"#6d28d9",marginBottom:5}}>
            {pct===100?"🏆 満点！すごい！":pct>=80?"🌟 よくできました！":pct>=60?"😄 がんばったね！":"💪 もう一回！"}
          </div>
          <div style={{fontSize:".88rem",color:"#777",marginBottom:20}}>
            {pct===100?"全問クリア！約分マスターだ！":`${FRAC_TOTAL}問中 ${correct}問 クリア（${pct}%）`}
          </div>
          <button onClick={restart} style={{width:"100%",padding:13,border:"none",borderRadius:16,
            fontSize:"1rem",fontWeight:900,cursor:"pointer",fontFamily:FONT,
            background:"linear-gradient(135deg,#f472b6,#c084fc)",color:"white"}}>もう一回やる 🔄</button>
        </div>
      );

      return (
        <div>
          <div style={{textAlign:"right",fontSize:"0.8rem",color:"#aaa",fontWeight:700}}>{qNum} / {FRAC_TOTAL}</div>
          <div style={{height:8,background:"#ede9fe",borderRadius:999,overflow:"hidden",margin:"4px 0 14px"}}>
            <div style={{height:"100%",width:`${(qNum/FRAC_TOTAL)*100}%`,
              background:"linear-gradient(90deg,#c084fc,#818cf8)",borderRadius:999,transition:"width .4s"}}/>
          </div>
          <div style={{background:"linear-gradient(135deg,#fdf4ff,#ede9fe)",borderRadius:18,
            padding:"16px 12px 14px",textAlign:"center",marginBottom:12}}>
            <div>
              <span style={{display:"inline-block",fontSize:"0.68rem",fontWeight:900,
                padding:"3px 10px",borderRadius:999,marginBottom:8,
                background:q.type==="decimal"?"#fce7f3":"#ede9fe",
                color:q.type==="decimal"?"#9d174d":"#5b21b6"}}>
                {q.type==="decimal"?"🔢 小数 → 分数":"✂️ 約分"}
              </span>
            </div>
            <div style={{fontSize:"1.3rem",fontWeight:900,color:"#7c3aed",marginBottom:10,
              minHeight:"2rem",letterSpacing:"0.05em"}}>
              {typed}{typing&&<span style={{animation:"blink .7s step-end infinite"}}>|</span>}
            </div>
            {!typing && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,flexWrap:"wrap"}}>
                {stepsN.map((n,i)=>{
                  const isLast=i===stepsN.length-1, isFin=done&&isLast;
                  return (
                    <span key={i} style={{display:"inline-flex",alignItems:"center",gap:3}}>
                      {i>0&&<span style={{color:"#c084fc",fontWeight:900,fontSize:"1rem"}}>÷{history[i-1].d}→</span>}
                      <Frac num={n} den={stepsD[i]} size="lg"
                        color={isFin?"#15803d":isLast?"#6d28d9":"#bbb"} strike={!isLast}/>
                    </span>
                  );
                })}
              </div>
            )}
          </div>
          {!typing&&!done&&trueDivs.length===0&&nowRed&&(
            <div style={{background:"#fff7ed",border:"2px solid #fdba74",borderRadius:14,
              padding:12,textAlign:"center",marginBottom:12,fontSize:"0.9rem",fontWeight:700,color:"#92400e"}}>
              これ以上約分できません！これが既約分数です ✅
            </div>
          )}
          {!typing&&!done&&!nowRed&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:"0.72rem",fontWeight:900,color:"#9333ea",letterSpacing:".06em",
                marginBottom:8,textAlign:"center"}}>
                {q.type==="decimal"?"💡 分子・分母を同じ数で割ろう！":"💡 どの数で割れる？（約分できる数を選ぼう）"}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",
                animation:shake?"shakeGrid .45s ease":"none"}}>
                {allChoices.map(d=>(
                  <button key={d} onClick={()=>handleDiv(d)}
                    style={{padding:"10px 20px",border:"2.5px solid #c084fc",borderRadius:14,
                      background:"white",color:"#6d28d9",fontSize:"1.05rem",fontWeight:900,
                      cursor:"pointer",fontFamily:FONT,transition:"all .15s"}}>
                    ÷ {d}
                  </button>
                ))}
              </div>
            </div>
          )}
          {done&&(
            <div style={{background:"#f0fdf4",border:"2px solid #86efac",borderRadius:14,
              padding:14,textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:"#15803d",marginBottom:6}}>🎉 既約分数になったよ！</div>
              <div style={{fontSize:"0.88rem",color:"#555",lineHeight:1.7}}>
                {q.type==="decimal"
                  ?<>{q.decimal} ＝ <strong style={{color:"#15803d",fontSize:"1.05rem"}}>{q.num}/{q.den}</strong><br/>（最大公約数は {gcd(q.origNum,q.origDen)}）</>
                  :<>{q.origNum} ÷ {q.origDen} ＝ <strong style={{color:"#15803d",fontSize:"1.05rem"}}>{q.num}/{q.den}</strong><br/>（最大公約数は {gcd(q.origNum,q.origDen)}）</>}
              </div>
            </div>
          )}
          {(done||(trueDivs.length===0&&nowRed))&&(
            <button onClick={next} style={{width:"100%",padding:13,border:"none",borderRadius:16,
              fontSize:"1rem",fontWeight:900,cursor:"pointer",fontFamily:FONT,
              background:"linear-gradient(135deg,#c084fc,#818cf8)",color:"white"}}>
              {qNum>=FRAC_TOTAL?"結果を見る 🎊":"つぎの問題 →"}
            </button>
          )}
          <style>{`@keyframes blink{0%,100%{opacity:1}50%{opacity:0}} @keyframes shakeGrid{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`}</style>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  メインアプリ
    // ═══════════════════════════════════════════
    function App() {
      const [tab,      setTab]      = useState("time");
      const [identity, setIdentity] = useState(null);
      const [timeTry,  setTimeTry]  = useState(0);
      const [fracTry,  setFracTry]  = useState(0);

      useEffect(() => {
        (async () => {
          try {
            const t = await safeStorage.get(STORAGE_TIME);
            if (t) setTimeTry(parseInt(t.value,10)||0);
            const f = await safeStorage.get(STORAGE_FRAC);
            if (f) setFracTry(parseInt(f.value,10)||0);
          } catch(_){}
        })();
      }, []);

      const handleIdentity = async (isKae) => {
        setIdentity(isKae);
        if (!isKae) return;
        
        if (tab==="time") {
          const n=timeTry+1; setTimeTry(n);
          try { await safeStorage.set(STORAGE_TIME,String(n)); } catch(_){}
        } else {
          const n=fracTry+1; setFracTry(n);
          try { await safeStorage.set(STORAGE_FRAC,String(n)); } catch(_){}
        }
      };

      const BG_TIME = "linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%)";
      const BG_FRAC = "linear-gradient(135deg,#f9a8d4 0%,#c084fc 50%,#818cf8 100%)";
      const bg = tab==="time" ? BG_TIME : BG_FRAC;
      const tryCount = tab==="time" ? timeTry : fracTry;

      if (identity===null) return <IdentityScreen onAnswer={handleIdentity} bg={bg} />;

      return (
        <div style={{minHeight:"100vh",background:bg,display:"flex",alignItems:"flex-start",
          justifyContent:"center",fontFamily:FONT,padding:"16px 16px 40px"}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
            * { box-sizing:border-box; }
            .outer { width:100%; max-width:480px; }
            .tabs { display:flex; gap:8px; margin-bottom:14px; }
            .tab { flex:1; padding:12px 8px; border:none; border-radius:16px; font-size:0.9rem;
                   font-weight:900; cursor:pointer; font-family:inherit; transition:all .2s; }
            .tab-active-time { background:white; color:#5a3e8f; box-shadow:0 4px 16px rgba(0,0,0,.15); }
            .tab-active-frac { background:white; color:#6d28d9; box-shadow:0 4px 16px rgba(0,0,0,.15); }
            .tab-inactive { background:rgba(255,255,255,.3); color:rgba(255,255,255,.85); }
            .tab-inactive:hover { background:rgba(255,255,255,.45); }
            .card { background:rgba(255,255,255,0.97); border-radius:24px; padding:22px 20px;
              box-shadow:0 20px 60px rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.3); }
            .try-badge { display:inline-flex; align-items:center; gap:4px;
              background:linear-gradient(135deg,#fce7f3,#ede9fe);
              border:1.5px solid #d8b4fe; border-radius:999px;
              padding:3px 12px; font-size:0.74rem; font-weight:900; color:#7c3aed; }
            .app-title { text-align:center; font-size:1.2rem; font-weight:900;
              color:${tab==="time"?"#5a3e8f":"#6d28d9"}; margin:0 0 4px; }
          `}</style>

          <div className="outer">
            <div className="tabs">
              <button className={`tab ${tab==="time"?"tab-active-time":"tab-inactive"}`}
                onClick={()=>{ setTab("time"); setIdentity(null); }}>
                ⏱️ 時間・速さ
              </button>
              <button className={`tab ${tab==="frac"?"tab-active-frac":"tab-inactive"}`}
                onClick={()=>{ setTab("frac"); setIdentity(null); }}>
                ✂️ 約分
              </button>
            </div>

            <div className="card">
              <div className="app-title">
                {tab==="time"?"⏱️ 時間・速さ変換クイズ":"✂️ 分数・約分れんしゅう"}
              </div>
              {identity && (
                <div style={{textAlign:"center",margin:"4px 0 10px"}}>
                  <span className="try-badge">🌸 佳英ちゃん　チャレンジ {tryCount} 回目！</span>
                </div>
              )}
              {tab==="time"
                ? <TimeQuiz key="time" identity={identity} tryCount={tryCount} />
                : <FracApp  key="frac" identity={identity} tryCount={tryCount} />}
            </div>
          </div>
        </div>
      );
    }

    const root = Frankenstein = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
